services:
  postgres-auth-db:
    image: postgres:16-alpine
    container_name: iticket-postgres-auth
    environment:
      POSTGRES_USER: iticket_user
      POSTGRES_PASSWORD: iticket_password
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - iticket-network


  postgres-catalog-db:
    image: postgres:16-alpine
    container_name: iticket-postgres
    environment:
      POSTGRES_USER: iticket_user
      POSTGRES_PASSWORD: iticket_password
      POSTGRES_DB: iticket_catalog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_catalog_data:/var/lib/postgresql/data
    networks:
      - iticket-network

  redis-cache:
    image: redis:7-alpine
    container_name: iticket-redis
    ports:
      - "6379:6379"
    networks:
      - iticket-network

  mongodb:
    image: mongo:7.0
    container_name: iticket-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - iticket-network

  # --- MESSAGE BROKER (KAFKA) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: iticket-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - iticket-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: iticket-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - iticket-network


  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: iticket-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: iticket-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
      - zookeeper
    networks:
      - iticket-network

  # MICROSERVICES

  ms-event-catalog:
    container_name: ms-event-catalog
    build:
      context: .
      dockerfile: ./ms-event-catalog/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-catalog-db:5432/iticket_catalog_db
      - SPRING_DATASOURCE_USERNAME=iticket_user
      - SPRING_DATASOURCE_PASSWORD=iticket_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=iticket-kafka:29092
    depends_on:
      - postgres-catalog-db
      - kafka
    networks:
      - iticket-network

  ms-auth:
    container_name: ms-auth
    build:
      context: .
      dockerfile: ./ms-auth/Dockerfile
    ports:
      - "9091:9091"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-auth-db:5432/user_db
      - SPRING_DATASOURCE_USERNAME=iticket_user
      - SPRING_DATASOURCE_PASSWORD=iticket_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - postgres-auth-db
    networks:
      - iticket-network

networks:
  iticket-network:
    driver: bridge

volumes:
  postgres_catalog_data:
  postgres_auth_data:
  mongo_data: