services:
  postgres-db:
    image: postgres:16-alpine
    container_name: iticket-postgres
    environment:
      POSTGRES_USER: iticket_user
      POSTGRES_PASSWORD: iticket_password
      POSTGRES_DB: iticket_catalog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iticket-network

  redis-cache:
    image: redis:7-alpine
    container_name: iticket-redis
    ports:
      - "6379:6379"
    networks:
      - iticket-network

  mongodb:
    image: mongo:7.0
    container_name: iticket-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - iticket-network

  # --- MESSAGE BROKER (KAFKA) ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: iticket-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - iticket-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: iticket-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - iticket-network

  # MICROSERVICES

  ms-event-catalog:
    container_name: ms-event-catalog
    build:
      context: .
      dockerfile: ./ms-event-catalog/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/iticket_catalog_db
      - SPRING_DATASOURCE_USERNAME=iticket_user
      - SPRING_DATASOURCE_PASSWORD=iticket_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - postgres-db
    networks:
      - iticket-network

networks:
  iticket-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data: